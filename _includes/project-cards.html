<style>
  .info-card-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .info-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
  }

  .info-image-container {
    height: 200px;
    overflow: hidden;
    background: linear-gradient(135deg, #f7b147 0%, #f79e47 100%);
  }

  .info-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .info-content {
    padding: 0.1rem 1rem 1rem 1rem;
  }

  .info-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-top: 0.4;          
    margin-bottom: 0.3rem;
    color: #333;
  }

  .info-description {
    color: #666;
    font-size: 0.9rem;
    line-height: 1.4;
    margin: 0;
  }

  @media (max-width: 768px) {
    .info-card-container {
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }
  }
</style>

<div class="info-card-container">
  {% for card in include.cards %}
    <div class="info-card">
      <div class="info-image-container">
        <img src="{{ card.image }}" alt="{{ card.title }}">
      </div>

      <div class="info-content">
        <h3 class="info-title">{{ card.title }}</h3>
        <p class="info-description">{{ card.text }}</p>
      </div>
    </div>
  {% endfor %}
</div>

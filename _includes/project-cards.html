<style>
  .info-card-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }

  .info-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    animation: fadeInUp 0.6s ease-out backwards;
  }

  .info-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.15);
  }

  .info-image-container {
    height: 220px;
    overflow: hidden;
    background: linear-gradient(135deg, #f7b147 0%, #f79e47 100%);
  }

  .info-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .info-content {
    padding: 1.5rem;
  }

  .info-title {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #333;
  }

  .info-description {
    color: #666;
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1rem;
  }

  .info-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .info-tag {
    background: linear-gradient(135deg, #f7b147 0%, #f79e47 100%);
    color: white;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    .info-card-container {
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
  }
</style>

<div class="info-card-container">
  {% for card in include.cards %}
    <div class="info-card">
      <div class="info-image-container">
        <img src="{{ card.image }}" alt="{{ card.title }}">
      </div>

      <div class="info-content">
        <h3 class="info-title">{{ card.title }}</h3>
        <p class="info-description">{{ card.text }}</p>

        {% if card.tags %}
          <div class="info-tags">
            {% for tag in card.tags %}
              <span class="info-tag">{{ tag }}</span>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    </div>
  {% endfor %}
</div>
